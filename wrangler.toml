name = "stann-lumo-portal"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "portal-db"
database_id = "your-database-id" # local dev will mock this, prod needs actual id
migrations_dir = "drizzle"

# R2 Storage Binding 
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "portal-storage"
