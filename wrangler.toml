# Cloudflare Workers / OpenNext 배포 설정
main = ".open-next/worker.js"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "portal-db"
database_id = "cde94290-17b3-4626-9a62-5bb83e68380b"
migrations_dir = "drizzle"

# R2 Storage Binding 
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "portal-storage"
